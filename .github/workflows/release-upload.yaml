---
name: Post Release Upload
# Uploads the ogmios static binary as a GitHub release asset for any
# tagged commit.

on:
  workflow_dispatch:
  release:
    types:
    - published
  push:
    tags:
    - '**'

permissions:
  contents: write
  actions: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  # TODO: switch back to this once Hydra reports check-runs to GitHub
  # wait-for-hydra:
  #   runs-on: ubuntu-latest
  #   steps:
  #   - name: Wait for Hydra build
  #     run: |
  #       check_name="ci/hydra-build:required"
  #       while true; do
  #         conclusion=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs?check_name=$check_name" \
  #           --paginate --jq '.check_runs[].conclusion')
  #         case "$conclusion" in
  #           success) echo "Hydra build succeeded"; exit 0 ;;
  #           "") echo "Hydra build pending, waiting 30s..."; sleep 30 ;;
  #           *) echo "Hydra build failed with: $conclusion"; exit 1 ;;
  #         esac
  #       done

  pull:
    # needs:
    # - wait-for-hydra
    name: "Download Asset from the Cache"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    # For annotated tags, GITHUB_SHA is the SHA of the tag object itself,
    # not of the commit it points at; HEAD after checkout is the commit.
    - name: Resolve ref to commit SHA
      run: echo "TARGET_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

    - name: Install Nix
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      with:
        extra_nix_config: |
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
          substituters = https://cache.iog.io/ https://cache.nixos.org/

    # Temporary: poll the Nix cache directly until Hydra check-run reporting is
    # fixed. Both architectures are built by Hydra; wait for each.
    - name: Wait for ogmios-musl in Hydra cache
      run: |
        set -o pipefail
        echo "Target SHA: $TARGET_SHA"
        flake_ref="git+https://github.com/$GITHUB_REPOSITORY?rev=$TARGET_SHA&submodules=1"
        deadline=$((SECONDS + 1800))
        for sys in x86_64-linux aarch64-linux; do
          if ! out=$(nix eval --raw "$flake_ref#packages.$sys.ogmios-musl"); then
            echo "nix eval failed for $sys"
            exit 1
          fi
          if [ -z "$out" ]; then
            echo "nix eval returned an empty path for $sys"
            exit 1
          fi
          echo "[$sys] resolved store path: $out"
          echo "[$sys] waiting for $out in cache..."
          while true; do
            if nix path-info --refresh --store https://cache.iog.io "$out" >/dev/null 2>&1; then
              echo "[$sys] found in cache"
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out after 30 minutes waiting for Hydra cache ($sys path: $out)"
              exit 1
            fi
            echo "[$sys] not in cache yet, waiting 30s..."
            sleep 30
          done
        done

    - name: Build
      run: |
        flake_ref="git+https://github.com/$GITHUB_REPOSITORY?rev=$TARGET_SHA&submodules=1"
        version="${GITHUB_REF_NAME//[^a-zA-Z0-9._-]/}"
        # Release assets are named after the nix system (x86_64-linux /
        # aarch64-linux), matching the upstream CardanoSolutions convention.
        for sys in x86_64-linux aarch64-linux; do
          nix build --builders "" --max-jobs 0 "$flake_ref#packages.$sys.ogmios-musl" -o "result-$sys"
          mkdir -p "staging-$sys/bin"
          cp "result-$sys/bin/ogmios" "staging-$sys/bin/"
          tar -czf "ogmios-${version}-${sys}.tar.gz" -C "staging-$sys" bin
        done

    - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: ${{ github.sha }}-linux
        path: ogmios-*-linux.tar.gz
        retention-days: 1

  upload-assets:
    needs:
    - pull
    name: "Upload Assets"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
      with:
        merge-multiple: true

    - name: Checksums
      run: sha256sum ogmios-*.tar.gz > ogmios-sha256sums.txt

    - name: Release
      uses: input-output-hk/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77 # v1
      with:
        draft: true
        files: |
          ogmios-*-linux.tar.gz
          ogmios-sha256sums.txt
